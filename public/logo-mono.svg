    <circle cx="18" cy="45" r="4" fill="#2d2a26"/>
    <circle cx="72" cy="45" r="14" fill="none" stroke="#2d2a26" stroke-width="3"/>
    <circle cx="72" cy="45" r="4" fill="#2d2a26"/>
